name: Credit Default MLOps Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  train-select-export-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "dvc[gdrive]"

      - name: Configure DVC remote URL
        run: dvc remote modify storage url "${{ secrets.DVC_REMOTE_URL }}"

      - name: Pull DVC data
        env:
          GDRIVE_CREDENTIALS_DATA: ${{ secrets.GDRIVE_CREDENTIALS_DATA }}
        run: dvc pull

      - name: Run MLflow training pipeline
        run: |
          python src/train_models.py

      - name: Select best model and register Champion
        run: |
          python src/select_best_model.py

      - name: Export Champion model
        run: |
          python src/export_champion.py

      - name: Verify exported model exists
        run: |
          ls -l model.pkl

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/credit-default-inference:latest .

      - name: Login to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/credit-default-inference:latest

      - name: Save Docker image as artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker save ${{ secrets.DOCKERHUB_USERNAME }}/credit-default-inference:latest -o credit-default-inference.tar

      - name: Upload Docker image artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: credit-default-inference-image
          path: credit-default-inference.tar